name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend and Commit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Compose Web (wasmJs)
        working-directory: ./frontend
        run: ./gradlew wasmJsBrowserDistribution --no-daemon

      - name: Copy frontend dist to backend resources
        run: |
          rm -rf backend/src/main/resources/static
          mkdir -p backend/src/main/resources/static
          cp -r frontend/build/dist/wasmJs/productionExecutable/. backend/src/main/resources/static/

      - name: Commit built frontend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/src/main/resources/static
          git diff --staged --quiet || git commit -m "ci: update built frontend [skip ci]"
          git push
